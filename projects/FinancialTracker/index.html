<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>💰 Finance Tracker · fixed palette</title>

  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
</head>

<body>

  
  <div class="tracker-card" id="trackerCard">
    <h1>
      <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-graph-up"
        viewBox="0 0 16 16">
        <path fill-rule="evenodd"
          d="M0 0h1v15h15v1H0zm14.817 3.113a.5.5 0 0 1 .07.704l-4.5 5.5a.5.5 0 0 1-.74.037L7.06 6.767l-3.656 5.027a.5.5 0 0 1-.808-.588l4-5.5a.5.5 0 0 1 .758-.06l2.609 2.61 4.15-5.073a.5.5 0 0 1 .704-.07" />
      </svg> Monthly Summary
      <span>Personal</span>
    </h1>
    <div class="subhead">track income, expenses & savings</div>

    <div id="app">

      
      <div class="summary-header">

        <div class="summary-grid" id="summaryPanel">
          <div class="summary-item">
            <div class="summary-label">💰 income</div>
            <div class="summary-value" id="totalIncome">0.00</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">💸 expenses</div>
            <div class="summary-value" id="totalExpense">0.00</div>
          </div>
          <div class="summary-item">
            <div class="summary-label">🏦 savings</div>
            <div class="summary-value" id="totalSavings">0.00</div>
          </div>
          <div class="summary-item balance-item">
            <div class="summary-label">⚖️ balance</div>
            <div class="summary-value" id="balance">0.00</div>
          </div>
        </div>

        
        <div class="currency-wrapper">
          <label for="currencySelect">currency</label>
          <select id="currencySelect" class="currency-select">
            <option value="USD" data-symbol="$">🇺🇸 USD ($)</option>
            <option value="EUR" data-symbol="€">🇪🇺 EUR (€)</option>
            <option value="GBP" data-symbol="£">🇬🇧 GBP (£)</option>
            <option value="JPY" data-symbol="¥">🇯🇵 JPY (¥)</option>
            <option value="CAD" data-symbol="C$">🇨🇦 CAD (C$)</option>
            <option value="AUD" data-symbol="A$">🇦🇺 AUD (A$)</option>
            <option value="INR" data-symbol="₹">🇮🇳 INR (₹)</option>
            <option value="PHP" data-symbol="₱">🇵🇭 PHP (₱)</option>
          </select>
        </div>
      </div>

      
      <div class="add-section">
        <div class="form-row">
          <div class="input-group">
            <label>description</label>
            <input type="text" id="descInput" placeholder="groceries, salary ..." maxlength="40">
          </div>
          <div class="input-group">
            <label>category</label>
            <select id="categorySelect">
              <option value="Food">🍕 Food</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Bills">📑 Bills</option>
              <option value="Entertainment">🎬 Entertainment</option>
              <option value="Income">💼 Income</option>
              <option value="Savings">🏦 Savings</option>
              <option value="Other">📌 Other</option>
            </select>
          </div>
          <div class="input-group">
            <label>amount</label>
            <input type="number" id="amountInput" placeholder="0.00" min="0.01" step="0.01">
          </div>
          <div class="input-group type-group">
            <label>type</label>
            <div class="type-btns" id="typeToggle">
              <button class="type-btn income active" data-type="income">➕ Income</button>
              <button class="type-btn expense" data-type="expense">➖ Expense</button>
              <button class="type-btn savings" data-type="savings">🏦 Savings</button>
            </div>
          </div>
          <button class="btn-add" id="addTransactionBtn">Add</button>
        </div>
      </div>

      
      <div class="chart-filter-row">
        <div class="pie-container">
          <canvas id="expensePieChart" width="300" height="300"></canvas>
          <p class="chart-caption">🔍 expense categories · labels shown</p>
        </div>

        <div class="filter-side">
          <div class="filter-bar">
            <div class="filter-tabs" id="filterTabs">
              <button class="filter-tab active" data-filter="all">All</button>
              <button class="filter-tab" data-filter="income">Income</button>
              <button class="filter-tab" data-filter="expense">Expense</button>
              <button class="filter-tab" data-filter="savings">Savings</button>
            </div>
            <span class="latest-badge">▼ latest</span>
          </div>

          <div class="transactions-list">
            <ul id="transactionList">
              <li class="empty-message">✨ no transactions yet. add one above.</li>
            </ul>
          </div>
        </div>
      </div>

      <div class="footer-note">✨ palette: #464CE0, #978CC1, #F5ECFF, #69BAA4 · click × to remove</div>
    </div>
  </div>

  <script src="index.js"></script>
</body>

</html>
