<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Modern Tetris</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="game-container">
        <canvas id="gameCanvas" width="300" height="600"></canvas>

        <div class="info-panel">
            <h2>TETRIS</h2>

            <div class="stat">
                <span>Timer</span>
                <div id="timer">120</div>
            </div>
            
            <div class="stat">
                <span>Score</span>
                <div id="score">0</div>
            </div>

            <div class="stat">
                <span>Lines</span>
                <div id="lines">0</div>
            </div>

            <div class="stat">
                <span>Level</span>
                <div id="level">1</div>
            </div>

            <button id="newGameBtn">New Game</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
